<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Portfolio </title>
    <style>
        :root {
            --bg: #000000;
            --accent: #007AFF;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.12);
            --text-dim: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg);
            color: white;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        
        #star-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        section {
            width: 100vw;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 120px 20px;
        }

        .hero-title {
            font-size: clamp(4rem, 15vw, 10rem);
            font-weight: 800;
            letter-spacing: -0.06em;
            text-align: center;
            line-height: 0.85;
            background: linear-gradient(180deg, #ffffff 40%, #555 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        
        #projects-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1200px;
            width: 100%;
            margin-top: 50px;
        }

        .project-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 40px;
            backdrop-filter: blur(30px);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            text-decoration: none; color: inherit;
            display: flex; flex-direction: column; justify-content: space-between; min-height: 250px;
        }

        .project-card:hover { 
            transform: translateY(-12px); 
            border-color: var(--accent); 
            background: rgba(0, 122, 255, 0.06); 
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }

        
        .jar-outer {
            position: relative;
            width: min(85vw, 500px); height: min(85vw, 500px);
            border: 1px solid var(--border); border-radius: 50%;
            background: radial-gradient(circle at 50% 10%, rgba(255,255,255,0.04), transparent);
        }
        #physics-canvas { display: block; width: 100%; height: 100%; border-radius: 50%; cursor: grab; }

        
        .dock-wrapper { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); z-index: 1000; }
        .dock {
            display: flex; background: rgba(12, 12, 12, 0.85); backdrop-filter: blur(25px);
            padding: 10px 30px; border-radius: 40px; border: 1px solid var(--border); gap: 24px;
            align-items: center;
        }
        .dock a { color: #777; text-decoration: none; font-size: 0.65rem; font-weight: 800; letter-spacing: 1.5px; transition: 0.3s; text-transform: uppercase; }
        .dock a:hover { color: white; transform: translateY(-3px); }
        .dock .sep { width: 1px; height: 15px; background: var(--border); }

        #assets { display: none; }
    </style>
</head>
<body>

    <canvas id="star-canvas"></canvas>

    <div id="assets">
        <img id="js" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg">
        <img id="py" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg">
        <img id="html" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg">
        <img id="css" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/css3/css3-original.svg">
        <img id="c" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/c/c-original.svg">
        <img id="cpp" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/cplusplus/cplusplus-original.svg">
        <img id="ruby" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/ruby/ruby-original.svg">
        <img id="perl" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/perl/perl-original.svg">
    </div>

    <section id="home">
        <h1 class="hero-title">Sahil Sinha</h1>
        <p style="margin-top: 20px; color: var(--text-dim); letter-spacing: 5px; text-transform: uppercase; font-size: 0.75rem;">Creative Developer | Vibe Coder</p>
        <p style="margin-top: 10px; color: var(--text-dim); letter-spacing: 5px; text-transform: uppercase; font-size: 0.60rem;">Dm for responsive website design</p>
    </section>

    <section id="work">
        <h2 style="font-size: 0.7rem; letter-spacing: 5px; color: var(--accent); margin-bottom: 40px;">SELECTED WORKS</h2>
        <div id="projects-container">
            <p style="text-align: center; color: var(--text-dim); grid-column: 1/-1;">Syncing GitHub API...</p>
        </div>
    </section>

    <section id="stack">
        <h2 style="font-size: 0.7rem; letter-spacing: 5px; color: var(--accent); margin-bottom: 40px;">TECH ENGINE</h2>
        <div class="jar-outer">
            <canvas id="physics-canvas"></canvas>
        </div>
    </section>

    <div class="dock-wrapper">
        <nav class="dock">
            <a href="#home">Home</a>
            <a href="#work">Work</a>
            <a href="#stack">Stack</a>
            <div class="sep"></div>
            <a href="https://github.com/minersahil20-creator" target="_blank">GitHub</a>
            <a href="https://instagram.com/_.lunar_heart._" target="_blank">Instagram</a>
        </nav>
    </div>

    <script>
        
        const starCanvas = document.getElementById('star-canvas');
        const sCtx = starCanvas.getContext('2d');
        let stars = [];

        function initStars() {
            starCanvas.width = window.innerWidth;
            starCanvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 250; i++) {
                stars.push({
                    x: Math.random() * starCanvas.width,
                    y: Math.random() * starCanvas.height,
                    size: Math.random() * 1.5,
                    opacity: Math.random(),
                    twinkle: Math.random() * 0.02,
                    driftX: (Math.random() - 0.5) * 0.2, 
                    driftY: (Math.random() - 0.5) * 0.2 
                });
            }
        }

        function drawStars() {
            sCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
            const scrollY = window.pageYOffset;

            stars.forEach(s => {
                sCtx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                sCtx.beginPath();
                
                
                let finalX = (s.x + s.driftX) % starCanvas.width;
                let finalY = (s.y + s.driftY - (scrollY * 0.1)) % starCanvas.height;
                
                if (finalY < 0) finalY = starCanvas.height + finalY;
                
                sCtx.arc(finalX, finalY, s.size, 0, Math.PI * 2);
                sCtx.fill();
                
                
                s.opacity += s.twinkle;
                if (s.opacity > 1 || s.opacity < 0.2) s.twinkle = -s.twinkle;
                
                
                s.x += s.driftX;
                s.y += s.driftY;
            });
            requestAnimationFrame(drawStars);
        }

        
        const GITHUB_USERNAME = 'minersahil20-creator';
        async function fetchGitHubProjects() {
            const container = document.getElementById('projects-container');
            try {
                const response = await fetch(`https://api.github.com/users/${GITHUB_USERNAME}/repos?sort=updated&per_page=6`);
                const repos = await response.json();
                if (!Array.isArray(repos)) return;
                container.innerHTML = ''; 
                repos.forEach(repo => {
                    const card = document.createElement('a');
                    card.href = repo.html_url; card.target = '_blank'; card.className = 'project-card';
                    card.innerHTML = `<div><h3>${repo.name.replace(/-/g, ' ')}</h3><p>${repo.description || "Technical development project."}</p></div><div style="font-size: 0.7rem; color: var(--accent); font-weight: 800;">SOURCE →</div>`;
                    container.appendChild(card);
                });
            } catch (e) { container.innerHTML = '<p>GitHub Offline.</p>'; }
        }

        
        const canvas = document.getElementById('physics-canvas');
        const ctx = canvas.getContext('2d');
        const mouse = { x: -1000, y: -1000 };
        let balls = []; let canvasSize = 0;

        function initPhysics() {
            canvasSize = canvas.parentElement.offsetWidth;
            const dpr = window.devicePixelRatio || 2;
            canvas.width = canvasSize * dpr; canvas.height = canvasSize * dpr;
            ctx.scale(dpr, dpr);
            if(balls.length === 0) {
                ['js','py','html','css','c','cpp','ruby','perl'].forEach(id => {
                    balls.push({ x: canvasSize/2, y: canvasSize/2, oldX: canvasSize/2 + Math.random()*5, oldY: canvasSize/2, r: canvasSize * 0.08, angle: 0, img: document.getElementById(id) });
                });
            }
        }

        window.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left; mouse.y = e.clientY - rect.top;
        });

        function updatePhysics() {
            const center = canvasSize / 2; const jarR = canvasSize / 2;
            for (let s = 0; s < 10; s++) {
                balls.forEach(b => {
                    let vx = (b.x - b.oldX) * 0.99; let vy = (b.y - b.oldY) * 0.99;
                    b.oldX = b.x; b.oldY = b.y; b.x += vx; b.y += vy + 0.12;
                    const dmx = b.x - mouse.x; const dmy = b.y - mouse.y; const dm = Math.sqrt(dmx*dmx + dmy*dmy);
                    if (dm < 90) { b.x += (dmx/dm) * 0.5; b.y += (dmy/dm) * 0.5; }
                    const dist = Math.sqrt((b.x - center)**2 + (b.y - center)**2);
                    if (dist > (jarR - b.r)) {
                        const nx = (b.x - center)/dist; const ny = (b.y - center)/dist;
                        b.x = center + nx * (jarR - b.r); b.y = center + ny * (jarR - b.r);
                    }
                    balls.forEach(b2 => {
                        if (b === b2) return;
                        const dx = b2.x - b.x; const dy = b2.y - b.y; const d = Math.sqrt(dx*dx + dy*dy);
                        if (d < b.r + b2.r) {
                            const overlap = (b.r + b2.r - d) / 2;
                            b.x -= (dx/d) * overlap; b.y -= (dy/d) * overlap;
                            b2.x += (dx/d) * overlap; b2.y += (dy/d) * overlap;
                        }
                    });
                });
            }
        }

        function drawPhysics() {
            ctx.clearRect(0, 0, canvasSize, canvasSize);
            balls.forEach(b => {
                b.angle += (b.x - b.oldX) * 0.05;
                ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(b.angle);
                ctx.beginPath(); ctx.arc(0,0,b.r,0,Math.PI*2); ctx.clip();
                ctx.drawImage(b.img, -b.r, -b.r, b.r*2, b.r*2); ctx.restore();
                const grad = ctx.createRadialGradient(b.x-b.r/3, b.y-b.r/3, 2, b.x, b.y, b.r);
                grad.addColorStop(0, 'rgba(255,255,255,0.2)'); grad.addColorStop(1, 'rgba(0,0,0,0.1)');
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
            });
            updatePhysics();
            requestAnimationFrame(drawPhysics);
        }

        initStars(); drawStars();
        fetchGitHubProjects(); initPhysics(); drawPhysics();
        window.addEventListener('resize', () => { initStars(); initPhysics(); });
    </script>
</body>
</html>
